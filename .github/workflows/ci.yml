name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck + Build
        run: npm run build

  # Estágio de deploy entra aqui quando a hospedagem for definida
  # (ex.: upload do dist/ para Vercel/Netlify ou imagem Docker + VPS)
